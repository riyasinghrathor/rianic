<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIANIC Productions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#050505;overflow:hidden;}
#c{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:1;}
#skip{position:fixed;bottom:28px;right:28px;z-index:100;background:transparent;
border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);
font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.18em;
padding:8px 18px;border-radius:4px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
#skip:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.4);}
#blackout{position:fixed;inset:0;z-index:200;background:#050505;opacity:0;pointer-events:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet"/>
</head>
<body>
<canvas id="c"></canvas>
<button id="skip" onclick="exitNow()">Skip ›</button>
<div id="blackout"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
'use strict';

/* ── MOBILE: instant redirect ── */
if (/Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768) {
  setTimeout(exitNow, 800);
}

function exitNow() {
  var b = document.getElementById('blackout');
  gsap.to(b, { opacity: 1, duration: 0.4, ease: 'power2.in', onComplete: function() {
    window.location.href = 'index.html?skip=1';
  }});
}

/* ── RENDERER ── */
var canvas  = document.getElementById('c');
var W = window.innerWidth, H = window.innerHeight;
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x050505, 1);

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 200);
camera.position.set(0, 0, 8);

window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

/* ── PARTICLES ── */
var PC = 500;
var pGeo = new THREE.BufferGeometry();
var pPos = new Float32Array(PC * 3);
var pCol = new Float32Array(PC * 3);
for (var i = 0; i < PC; i++) {
  pPos[i*3]   = (Math.random()-0.5)*28;
  pPos[i*3+1] = (Math.random()-0.5)*18;
  pPos[i*3+2] = (Math.random()-0.5)*18;
  var b = Math.random() < 0.15;
  pCol[i*3]   = b ? 0.31 : 0.85; pCol[i*3+1] = b ? 0.55 : 0.85; pCol[i*3+2] = b ? 1.0 : 0.85;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
var pMat = new THREE.PointsMaterial({ size: 0.055, vertexColors: true, transparent: true, opacity: 0 });
var pts  = new THREE.Points(pGeo, pMat);
scene.add(pts);

/* ── R LETTER ── */
var rGroup = new THREE.Group();
scene.add(rGroup);

function makeLine(x1,y1,z1, x2,y2,z2, color, opacity) {
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([x1,y1,z1,x2,y2,z2]), 3));
  var m = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: opacity });
  var l = new THREE.Line(g, m);
  l.visible = false;
  rGroup.add(l);
  return l;
}

// R segments — white strokes
var W1 = 0xF5F5F5, BLUE = 0x4F8CFF;
var rLines = [
  makeLine(-0.85, 1.1, 0,  -0.85,-1.1, 0, W1, 1),   // stem
  makeLine(-0.85, 1.1, 0,   0.45, 1.1, 0, W1, 1),   // top bar
];
// Bowl arc — 10 segments
var bCx=0.45, bCy=0.35, bR=0.75;
for (var s=0; s<10; s++) {
  var a1 = Math.PI/2 - (s/10)*Math.PI;
  var a2 = Math.PI/2 - ((s+1)/10)*Math.PI;
  rLines.push(makeLine(
    bCx+bR*Math.cos(a1), bCy+bR*Math.sin(a1), 0,
    bCx+bR*Math.cos(a2), bCy+bR*Math.sin(a2), 0,
    W1, 1
  ));
}
rLines.push(makeLine(-0.85,-0.4,0,  0.55,-0.4,0, W1, 1)); // mid bar
rLines.push(makeLine( 0.15,-0.4,0,  0.95,-1.1,0, BLUE, 1)); // leg — blue

// Glow dot
var glowG = new THREE.SphereGeometry(0.05,8,8);
var glowM = new THREE.MeshBasicMaterial({ color: 0x4F8CFF, transparent: true, opacity: 0 });
var glow  = new THREE.Mesh(glowG, glowM);
rGroup.add(glow);

/* ── DIAMOND ── */
var dGroup = new THREE.Group();
scene.add(dGroup);
dGroup.visible = false;

function dLine(x1,y1,x2,y2,col,op) {
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([x1,y1,0,x2,y2,0]),3));
  var m = new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op});
  var l = new THREE.Line(g,m); l.visible=false; dGroup.add(l); return l;
}
var dLines = [
  dLine( 0, 1.75, -1.75, 0, 0x2a2a2a, 0),
  dLine(-1.75, 0,  0,-1.75, 0x2a2a2a, 0),
  dLine( 0, 1.75,  1.75, 0, 0x4F8CFF, 0),
  dLine( 1.75, 0,  0,-1.75, 0x4F8CFF, 0),
];

/* ── ORBIT PARTICLES ── */
var OC = 60;
var oGeo = new THREE.BufferGeometry();
var oPos = new Float32Array(OC*3);
oGeo.setAttribute('position', new THREE.BufferAttribute(oPos,3));
var oMat = new THREE.PointsMaterial({color:0x4F8CFF,size:0.04,transparent:true,opacity:0});
var orbit = new THREE.Points(oGeo, oMat);
rGroup.add(orbit);

/* ── CAMERA STATE ── */
var camZ = {val: 8};
var camRY = {val: 0};

/* ── TIMELINE ── */
var tl = gsap.timeline();

// Scene 1: particles appear, camera pushes
tl.to(pMat, {opacity:0.65, duration:0.8, ease:'power2.out'}, 0)
  .to(camZ,  {val:6.2, duration:1.2, ease:'power2.inOut'}, 0);

// Scene 2: draw R
tl.to(glowM, {opacity:1, duration:0.2}, 0.9);
rLines.forEach(function(line, idx) {
  var t = 1.0 + (idx / rLines.length) * 1.0;
  tl.add(function(l){ return function() {
    l.visible = true;
    var p = l.geometry.attributes.position.array;
    glow.position.set(p[3], p[4], p[5]);
  }; }(line), t);
});
tl.to(camRY, {val:0.25,  duration:0.9, ease:'power1.inOut'}, 1.0)
  .to(camRY, {val:-0.1, duration:0.5, ease:'power1.inOut'}, 1.7);

// Scene 3: diamond
tl.add(function(){ dGroup.visible = true; }, 2.0);
dLines.forEach(function(dl, i) {
  var targetOp = i < 2 ? 0.3 : 0.7;
  tl.add(function(line, op){ return function(){
    line.visible = true;
    gsap.to(line.material, {opacity: op, duration:0.25});
  }; }(dl, targetOp), 2.0 + i*0.18);
});
tl.to(glowM, {opacity:0, duration:0.3}, 2.2);
tl.to(oMat,  {opacity:0.45, duration:0.5}, 2.5);

// Scene 4: float & settle
tl.to(camRY, {val:0, duration:0.8, ease:'power2.inOut'}, 3.0)
  .to(camZ,  {val:7.5, duration:0.9, ease:'power2.inOut'}, 3.0);

// Scene 5: exit
tl.add(function(){ exitNow(); }, 4.3);

/* ── RENDER LOOP ── */
var clock = new THREE.Clock();
var ft = 0;

(function animate() {
  requestAnimationFrame(animate);
  var dt = clock.getDelta();
  ft += dt;

  // Breathe
  var breathe = Math.sin(ft * (Math.PI*2/5)) * 0.04;
  rGroup.position.y  = breathe;
  dGroup.position.y  = breathe;

  // Orbit
  var op = oGeo.attributes.position.array;
  for (var j=0; j<OC; j++) {
    var ang = (j/OC)*Math.PI*2 + ft*0.2;
    var rad = 1.65 + Math.sin(ft*0.4+j)*0.08;
    op[j*3]   = Math.cos(ang)*rad;
    op[j*3+1] = Math.sin(ang)*rad*0.65;
    op[j*3+2] = Math.sin(ft+j*0.5)*0.12;
  }
  oGeo.attributes.position.needsUpdate = true;

  // Particle drift
  var pp = pGeo.attributes.position.array;
  for (var k=0; k<PC; k++) {
    pp[k*3+1] += 0.0007;
    if (pp[k*3+1]>9) pp[k*3+1]=-9;
  }
  pGeo.attributes.position.needsUpdate = true;

  // Camera
  camera.position.z += (camZ.val - camera.position.z) * 0.06;
  camera.rotation.y += (camRY.val - camera.rotation.y) * 0.07;
  camera.lookAt(0, breathe*0.3, 0);

  renderer.render(scene, camera);
})();
</script>
</body>
</html>
