<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIANIC Productions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#050505;overflow:hidden;font-family:'Space Grotesk',sans-serif;}
#intro{position:fixed;inset:0;z-index:9999;background:#050505;}
#c{display:block;width:100%;height:100%;position:absolute;inset:0;}

/* Skip button */
#skip{position:fixed;bottom:32px;right:32px;z-index:10000;background:transparent;border:1px solid rgba(255,255,255,0.15);
color:rgba(255,255,255,0.4);font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.2em;
padding:8px 18px;border-radius:4px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
#skip:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.4);}

/* Sound button */
#sound-btn{position:fixed;bottom:32px;left:32px;z-index:10000;background:transparent;border:1px solid rgba(255,255,255,0.15);
color:rgba(255,255,255,0.4);font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.2em;
padding:8px 18px;border-radius:4px;cursor:pointer;transition:all 0.3s;text-transform:uppercase;}
#sound-btn:hover{color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.4);}

/* Final overlay logo (for morph transition) */
#morph-logo{position:fixed;inset:0;z-index:10001;display:flex;flex-direction:column;align-items:center;
justify-content:center;pointer-events:none;opacity:0;}
#morph-logo img{width:140px;height:140px;object-fit:contain;}
#morph-wordmark{margin-top:20px;text-align:center;}
#morph-wordmark .name{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;
letter-spacing:0.28em;color:#F5F5F5;}
#morph-wordmark .sub{font-family:'Inter',sans-serif;font-size:11px;font-weight:400;
letter-spacing:0.65em;color:#8A8A8A;margin-top:4px;}

/* Transition overlay */
#trans-overlay{position:fixed;inset:0;z-index:10002;background:#050505;opacity:0;pointer-events:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet"/>
</head>
<body>

<div id="intro">
  <canvas id="c"></canvas>
</div>

<button id="skip" onclick="skipIntro()">Skip</button>
<button id="sound-btn" onclick="toggleSound()">♪ Sound</button>

<div id="morph-logo">
  <img src="rianic-logo.svg" alt="RIANIC Productions"/>
  <div id="morph-wordmark">
    <div class="name">RIANIC</div>
    <div class="sub">PRODUCTIONS</div>
  </div>
</div>
<div id="trans-overlay"></div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
'use strict';

/* ─── MOBILE CHECK ─── */
const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
if (isMobile) {
  // Simple fade-in on mobile — skip heavy 3D
  document.getElementById('intro').style.transition = 'opacity 0.8s';
  setTimeout(() => {
    document.getElementById('intro').style.opacity = '0';
    setTimeout(() => { window.location.href = 'index.html?skip=1'; }, 800);
  }, 1200);
}

/* ─── AUDIO ─── */
let audioCtx, soundEnabled = false;
function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('sound-btn').textContent = soundEnabled ? '♪ On' : '♪ Sound';
  if (soundEnabled) playIdent();
}
function playIdent() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    // Cinematic low synth hit — two oscillators
    [[55, 0.18],[110, 0.09],[220, 0.045]].forEach(([freq, gain]) => {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(gain, t + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
      osc.start(t); osc.stop(t + 4);
    });
    // High shimmer
    const osc2 = audioCtx.createOscillator();
    const g2   = audioCtx.createGain();
    osc2.connect(g2); g2.connect(audioCtx.destination);
    osc2.frequency.value = 880;
    osc2.type = 'sine';
    g2.gain.setValueAtTime(0, t + 1);
    g2.gain.linearRampToValueAtTime(0.03, t + 1.4);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 4);
    osc2.start(t + 1); osc2.stop(t + 4);
  } catch(e) {}
}

/* ─── THREE.JS SETUP ─── */
if (!isMobile) {
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050505, 1);
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 8);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ─── PARTICLES ─── */
const PARTICLE_COUNT = 600;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(PARTICLE_COUNT * 3);
const pCol = new Float32Array(PARTICLE_COUNT * 3);
for (let i = 0; i < PARTICLE_COUNT; i++) {
  pPos[i*3]   = (Math.random() - 0.5) * 30;
  pPos[i*3+1] = (Math.random() - 0.5) * 20;
  pPos[i*3+2] = (Math.random() - 0.5) * 20;
  const isBlue = Math.random() < 0.15;
  pCol[i*3]   = isBlue ? 0.31 : 0.9;
  pCol[i*3+1] = isBlue ? 0.55 : 0.9;
  pCol[i*3+2] = isBlue ? 1.0  : 0.9;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
const pMat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0 });
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

/* ─── R LETTERFORM GEOMETRY ─── */
// R defined as line segments in 2D, extruded slightly in Z for 3D feel
// All coordinates normalized around center (0,0)
// Stem, top bar, bowl arc (8 segments), mid bar, leg
const rPoints = [];

function seg(ax,ay,bx,by) {
  rPoints.push([ax, ay, 0, bx, by, 0]);
}

// Stem
seg(-0.8, 1.1, -0.8, -1.1);
// Top bar
seg(-0.8, 1.1,  0.5, 1.1);
// Bowl arc — 8 segments approximating semicircle
const bowlSegs = 10;
const bowlCx = 0.5, bowlCy = 0.35, bowlR = 0.75;
for (let i = 0; i < bowlSegs; i++) {
  const a1 = (Math.PI/2) - (i / bowlSegs) * Math.PI;
  const a2 = (Math.PI/2) - ((i+1) / bowlSegs) * Math.PI;
  rPoints.push([
    bowlCx + bowlR * Math.cos(a1), bowlCy + bowlR * Math.sin(a1), 0,
    bowlCx + bowlR * Math.cos(a2), bowlCy + bowlR * Math.sin(a2), 0,
  ]);
}
// Mid bar
seg(-0.8, -0.4,  0.55, -0.4);
// Leg — blue (stored separately, same array but flagged by index)
const legStartIdx = rPoints.length;
seg(0.18, -0.4,  0.95, -1.1);

/* ─── BUILD LINE MESHES ─── */
const rGroup = new THREE.Group();
scene.add(rGroup);

const lineMat     = new THREE.LineBasicMaterial({ color: 0xF5F5F5, transparent: true, opacity: 0, linewidth: 2 });
const legMat      = new THREE.LineBasicMaterial({ color: 0x4F8CFF, transparent: true, opacity: 0, linewidth: 2 });
const glowLineMat = new THREE.LineBasicMaterial({ color: 0x4F8CFF, transparent: true, opacity: 0, linewidth: 1 });

// Glow dot that travels along drawing path
const glowGeo  = new THREE.SphereGeometry(0.04, 8, 8);
const glowMat  = new THREE.MeshBasicMaterial({ color: 0x4F8CFF, transparent: true, opacity: 0 });
const glowDot  = new THREE.Mesh(glowGeo, glowMat);
rGroup.add(glowDot);

// Trail particles (orbit)
const trailCount = 80;
const trailGeo = new THREE.BufferGeometry();
const trailPos = new Float32Array(trailCount * 3);
for (let i = 0; i < trailCount; i++) {
  const angle  = (i / trailCount) * Math.PI * 2;
  const radius = 1.6 + Math.random() * 0.6;
  trailPos[i*3]   = Math.cos(angle) * radius;
  trailPos[i*3+1] = Math.sin(angle) * radius * 0.7;
  trailPos[i*3+2] = (Math.random() - 0.5) * 0.3;
}
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
const trailMat = new THREE.PointsMaterial({ color: 0x4F8CFF, size: 0.04, transparent: true, opacity: 0 });
const trailParticles = new THREE.Points(trailGeo, trailMat);
rGroup.add(trailParticles);

/* Build individual line segments (hidden at start) */
const lineObjects = [];
rPoints.forEach((pts, idx) => {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
  const mat = (idx >= legStartIdx) ? legMat.clone() : lineMat.clone();
  const line = new THREE.Line(geo, mat);
  line.visible = false;
  rGroup.add(line);
  lineObjects.push(line);
});

/* ─── DIAMOND ─── */
// Points: Top(0,1.7) Right(1.7,0) Bottom(0,-1.7) Left(-1.7,0)
const diamondGroup = new THREE.Group();
scene.add(diamondGroup);
const dPts = [
  [0, 1.7,  -1.7, 0],  // top-left
  [-1.7, 0,  0, -1.7], // bot-left
  [0, 1.7,   1.7, 0],  // top-right (blue)
  [1.7, 0,   0, -1.7], // bot-right (blue)
];
const dMats = [
  new THREE.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0 }),
  new THREE.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0 }),
  new THREE.LineBasicMaterial({ color: 0x4F8CFF, transparent: true, opacity: 0 }),
  new THREE.LineBasicMaterial({ color: 0x4F8CFF, transparent: true, opacity: 0 }),
];
const diamondLines = [];
dPts.forEach((pts, i) => {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(
    new Float32Array([pts[0], pts[1], 0, pts[2], pts[3], 0]), 3));
  const line = new THREE.Line(geo, dMats[i]);
  line.visible = false;
  diamondGroup.add(line);
  diamondLines.push(line);
});
diamondGroup.visible = false;

/* ─── BLOOM SIMULATION via additive sprites ─── */
function makeGlow(color, size) {
  const canvas2 = document.createElement('canvas');
  canvas2.width = canvas2.height = 64;
  const ctx = canvas2.getContext('2d');
  const grad = ctx.createRadialGradient(32,32,0, 32,32,32);
  grad.addColorStop(0,   color);
  grad.addColorStop(0.3, color.replace('1)', '0.4)'));
  grad.addColorStop(1,   color.replace('1)', '0)'));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,64,64);
  const tex = new THREE.CanvasTexture(canvas2);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(size, size, 1);
  return sprite;
}
const bloomBlue = makeGlow('rgba(79,140,255,1)', 1.2);
bloomBlue.position.set(0.18, -0.4, 0);
rGroup.add(bloomBlue);

/* ─── CAMERA STATE ─── */
const camTarget = { x: 0, y: 0, z: 8 };
const camRot    = { x: 0, y: 0 };

/* ─── TIMELINE ─── */
let introComplete = false;
let floatOffset = 0;

function runTimeline() {
  const tl = gsap.timeline();

  /* Scene 1: 0–1s — particles fade in, camera push */
  tl.to(pMat, { opacity: 0.7, duration: 0.8, ease: 'power2.out' }, 0)
    .to(camTarget, { z: 6, duration: 1.2, ease: 'power2.inOut' }, 0);

  /* Scene 2: 1–2s — draw R line by line */
  tl.add(() => {
    glowMat.opacity = 1;
  }, 1.0);

  lineObjects.forEach((line, i) => {
    const delay = 1.0 + (i / lineObjects.length) * 1.0;
    const isLeg = i >= legStartIdx;
    tl.add(() => {
      line.visible = true;
      line.material.opacity = 1;
      // Move glow dot to end of this segment
      const pos = line.geometry.attributes.position.array;
      glowDot.position.set(pos[3], pos[4], pos[5]);
    }, delay);
  });

  // Camera rotation during draw
  tl.to(camRot, { y: 0.3, duration: 1.0, ease: 'power1.inOut' }, 1.0)
    .to(camRot, { y: -0.15, duration: 0.6, ease: 'power1.inOut' }, 1.8);

  /* Scene 3: 2–3s — diamond draws */
  tl.add(() => {
    diamondGroup.visible = true;
  }, 2.0);

  diamondLines.forEach((line, i) => {
    tl.add(() => {
      line.visible = true;
      gsap.to(line.material, { opacity: i < 2 ? 0.35 : 0.75, duration: 0.25 });
    }, 2.0 + i * 0.18);
  });

  /* Glow dot fades out */
  tl.to(glowMat, { opacity: 0, duration: 0.3 }, 2.2);

  /* Trail particles appear */
  tl.to(trailMat, { opacity: 0.5, duration: 0.5 }, 2.4);
  tl.to(bloomBlue.material, { opacity: 0.6, duration: 0.4 }, 2.3);

  /* Scene 4: 3–4s — zoom out, float begins */
  tl.to(camRot, { y: 0, x: 0, duration: 0.8, ease: 'power2.inOut' }, 3.0)
    .to(camTarget, { z: 7.5, duration: 1.0, ease: 'power2.inOut' }, 3.0);

  /* Scene 5: 4–5s — morph to navbar logo */
  tl.add(() => {
    morphToNavbar();
  }, 4.2);
}

function morphToNavbar() {
  const morphLogo = document.getElementById('morph-logo');
  const overlay   = document.getElementById('trans-overlay');

  // 1. Fade in the 2D logo overlay centred on screen
  gsap.to(morphLogo, { opacity: 1, duration: 0.5, ease: 'power2.out' });

  // 2. Fade 3D canvas out simultaneously
  gsap.to(canvas, { opacity: 0, duration: 0.5, delay: 0.3, ease: 'power2.in' });
  gsap.to(pMat,   { opacity: 0, duration: 0.3 });

  // 3. After a beat, scale logo down and slide it to top-left (navbar position)
  gsap.to('#morph-logo img', {
    width: 36, height: 36,
    duration: 0.7, delay: 0.8,
    ease: 'power3.inOut'
  });
  gsap.to('#morph-wordmark .name', { fontSize: '0.9rem', duration: 0.7, delay: 0.8, ease: 'power3.inOut' });
  gsap.to('#morph-wordmark .sub',  { fontSize: '0.55rem', duration: 0.7, delay: 0.8, ease: 'power3.inOut' });
  gsap.to(morphLogo, {
    top: '16px', left: '24px', bottom: 'auto', right: 'auto',
    transform: 'none',
    flexDirection: 'row',
    gap: '12px',
    alignItems: 'center',
    justifyContent: 'flex-start',
    duration: 0.7, delay: 0.8,
    ease: 'power3.inOut'
  });

  // 4. Flash overlay then show site
  setTimeout(() => {
    gsap.to(overlay, { opacity: 1, duration: 0.25, ease: 'power2.in', onComplete: () => {
      launchSite();
    }});
  }, 1700);
}

function launchSite() {
  // Flag is already set by index.html before redirect — safe to go back
  window.location.href = 'index.html?skip=1';
}

/* ─── ANIMATE ─── */
const clock = new THREE.Clock();
let floatT = 0;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  floatT += delta;

  // Breathe — 0.4px up/down every 5 seconds
  const breathe = Math.sin(floatT * (Math.PI * 2 / 5)) * 0.04;
  rGroup.position.y = breathe;
  diamondGroup.position.y = breathe;

  // Trail orbit
  const tp = trailGeo.attributes.position.array;
  for (let i = 0; i < trailCount; i++) {
    const angle = (i / trailCount) * Math.PI * 2 + floatT * 0.18;
    const radius = 1.6 + Math.sin(floatT * 0.5 + i) * 0.1;
    tp[i*3]   = Math.cos(angle) * radius;
    tp[i*3+1] = Math.sin(angle) * radius * 0.7;
    tp[i*3+2] = Math.sin(floatT + i * 0.5) * 0.15;
  }
  trailGeo.attributes.position.needsUpdate = true;

  // Slow particle drift
  const pp = pGeo.attributes.position.array;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pp[i*3+1] += 0.0008;
    if (pp[i*3+1] > 10) pp[i*3+1] = -10;
  }
  pGeo.attributes.position.needsUpdate = true;

  // Camera
  camera.position.x += (camTarget.x - camera.position.x) * 0.05;
  camera.position.y += (camTarget.y - camera.position.y) * 0.05;
  camera.position.z += (camTarget.z - camera.position.z) * 0.05;
  camera.rotation.y += (camRot.y - camera.rotation.y) * 0.06;
  camera.rotation.x += (camRot.x - camera.rotation.x) * 0.06;
  camera.lookAt(0, breathe * 0.5, 0);

  renderer.render(scene, camera);
}

animate();
runTimeline();
} // end !isMobile

/* ─── SKIP ─── */
function skipIntro() {
  window.location.href = 'index.html?skip=1';
}
</script>
</body>
</html>
